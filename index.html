<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentOS Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    /* ── Glassmorphism Foundation ── */
    .glass-card {
      background: rgba(31,31,43,0.45);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-xl);
      box-shadow:
        0 4px 30px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 80px -20px rgba(139,92,246,0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
      pointer-events: none;
      border-radius: inherit;
    }
    .glass-card:hover {
      border-color: rgba(255,255,255,0.14);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 120px -20px rgba(139,92,246,0.15);
      transform: translateY(-2px);
    }

    /* ── Dissolve / Vanish Animations ── */
    @keyframes dissolveIn {
      0% { opacity: 0; filter: blur(12px) brightness(1.8); transform: scale(0.92) translateY(16px); }
      60% { opacity: 1; filter: blur(2px) brightness(1.1); }
      100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1) translateY(0); }
    }
    @keyframes vanishOut {
      0% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1) translateY(0); }
      100% { opacity: 0; filter: blur(16px) brightness(1.6); transform: scale(0.88) translateY(-20px); }
    }
    @keyframes glassPulse {
      0%, 100% { box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 80px -20px rgba(139,92,246,0.1); }
      50% { box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 120px -20px rgba(139,92,246,0.2); }
    }
    .dissolve-in {
      animation: dissolveIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .vanish-out {
      animation: vanishOut 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    .glass-pulse {
      animation: glassPulse 4s ease-in-out infinite;
    }

    /* ── Nav Bar ── */
    .nav-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-4); height: 56px;
      background: rgba(15,15,25,0.7);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 40px rgba(0,0,0,0.4);
    }
    .nav-brand { display: flex; align-items: center; gap: var(--space-2); }
    .nav-ring {
      width: 30px; height: 30px; border-radius: 50%;
      background: conic-gradient(from 0deg, #8B5CF6, #7DD3FC, #5EE2B5, #A78BFA, #8B5CF6);
      display: flex; align-items: center; justify-content: center;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-ring-inner {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(15,15,25,0.95); display: flex; align-items: center; justify-content: center;
    }
    .nav-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--brand-mint);
      box-shadow: 0 0 12px var(--brand-mint), 0 0 24px rgba(94,226,181,0.3);
      animation: pulse 2s ease infinite;
    }
    .nav-title { font: 700 var(--font-size-base) var(--font-display); letter-spacing: 0.02em; color: var(--text-primary); }
    .nav-subtitle { font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted); letter-spacing: var(--letter-spacing-wide); text-transform: uppercase; }
    .nav-tabs {
      display: flex; gap: 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-full); padding: 3px;
      backdrop-filter: blur(8px);
    }
    .nav-tab {
      padding: 6px 18px; border-radius: var(--radius-full);
      font: 500 var(--font-size-sm) var(--font-mono);
      color: var(--text-muted); cursor: pointer; border: none; background: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: var(--letter-spacing-wide); text-transform: uppercase;
    }
    .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
    .nav-tab.active {
      background: rgba(255,255,255,0.95); color: var(--bg-base);
      box-shadow: 0 2px 12px rgba(255,255,255,0.15);
    }
    .nav-status {
      display: flex; align-items: center; gap: var(--space-2);
      font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--brand-mint);
      box-shadow: 0 0 10px var(--brand-mint), 0 0 20px rgba(94,226,181,0.3);
      animation: pulse 2s ease infinite;
    }
    .nav-clock { font: 400 var(--font-size-sm) var(--font-mono); color: var(--text-muted); }

    /* ── Layout ── */
    .main-content { padding-top: 72px; padding: 72px var(--space-4) var(--space-4); position: relative; z-index: 1; }
    #three-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .tab-panel.dissolving { animation: dissolveIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    .section-eyebrow {
      font: 500 var(--font-size-xs) var(--font-mono);
      color: var(--text-muted); letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase; margin-bottom: var(--space-2);
    }
    .section-heading {
      font: 500 var(--font-size-3xl) var(--font-display);
      color: var(--text-primary); margin-bottom: var(--space-4);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--space-3); }
    .grid-ops { display: grid; grid-template-columns: 180px 1fr 1fr; gap: var(--space-5); }
    .grid-tasks { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }

    .ops-column { display: flex; flex-direction: column; gap: var(--space-3); }
    .ops-label {
      font: 500 var(--font-size-xs) var(--font-mono);
      color: var(--text-muted); letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
    }

    .agent-card {
      background: rgba(31,31,43,0.4);
      backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-xl);
      padding: var(--space-3);
      position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .agent-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--agent-color, var(--brand-violet));
      box-shadow: 0 0 20px var(--agent-color, var(--brand-violet));
    }
    .agent-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
      pointer-events: none; border-radius: inherit;
    }
    .agent-card:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .task-column-header {
      font: 500 var(--font-size-sm) var(--font-mono);
      color: var(--text-muted); letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase; margin-bottom: var(--space-3);
      display: flex; align-items: center; justify-content: space-between;
    }
    .task-card {
      background: rgba(31,31,43,0.4);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      padding: var(--space-3);
      margin-bottom: var(--space-2);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .task-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 50%);
      pointer-events: none; border-radius: inherit;
    }
    .task-card:hover {
      border-color: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }
    .task-title { font: 500 var(--font-size-sm) var(--font-display); margin-bottom: var(--space-1); color: var(--text-primary); }
    .task-notes { font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted); margin-bottom: var(--space-2); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .task-footer { display: flex; align-items: center; justify-content: space-between; }
    .task-time { font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted); }
    .task-actions { display: flex; gap: var(--space-1); }
    .task-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      color: var(--text-muted); cursor: pointer; padding: 3px 8px;
      font: 400 var(--font-size-xs) var(--font-mono);
      transition: all 0.2s ease;
    }
    .task-btn:hover {
      background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15);
      color: var(--text-primary);
    }

    .priority-chip {
      display: inline-block; padding: 2px 8px; border-radius: var(--radius-full);
      font: 500 var(--font-size-xs) var(--font-mono); text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    .priority-high { background: rgba(242,109,109,0.15); color: var(--brand-red); border: 1px solid rgba(242,109,109,0.2); }
    .priority-medium { background: rgba(245,181,68,0.15); color: var(--brand-amber); border: 1px solid rgba(245,181,68,0.2); }
    .priority-low { background: rgba(138,138,155,0.15); color: var(--text-muted); border: 1px solid rgba(138,138,155,0.2); }

    .cron-card {
      background: rgba(31,31,43,0.4);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      padding: var(--space-3); margin-bottom: var(--space-2);
      position: relative; overflow: hidden;
    }
    .cron-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 50%);
      pointer-events: none;
    }
    .cron-cmd { font: 400 13px var(--font-mono); color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cron-schedule { font: 400 var(--font-size-xs) var(--font-mono); color: var(--brand-cyan); }
    .cron-desc { font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted); }
    .cron-source { font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted); opacity: 0.5; }
    .tf-btn {
      padding: 4px 12px; border-radius: var(--radius-full);
      font: 500 var(--font-size-xs) var(--font-mono);
      color: var(--text-muted); cursor: pointer; border: none; background: none;
      transition: all 0.2s ease;
      letter-spacing: var(--letter-spacing-wide); text-transform: uppercase;
    }
    .tf-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
    .tf-btn.active {
      background: rgba(255,255,255,0.95); color: var(--bg-base);
      box-shadow: 0 2px 12px rgba(255,255,255,0.15);
    }

    .content-layout { display: grid; grid-template-columns: 360px 1fr; gap: var(--space-4); }
    .content-sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .content-agent-group {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      overflow: hidden;
      padding: 0;
    }

    .content-group-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 14px 16px;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      font: inherit;
      text-align: left;
      transition: background 0.2s ease;
    }
    .content-group-toggle:hover { background: rgba(255,255,255,0.04); }
    .content-group-toggle:focus { outline: none; box-shadow: inset 0 0 0 1px rgba(139,92,246,0.35); }
    .content-group-chevron {
      flex-shrink: 0;
      width: 20px;
      font: 400 16px var(--font-mono);
      color: var(--text-muted);
      transition: transform 0.2s ease;
      text-align: center;
    }
    .content-group-open .content-group-chevron { transform: rotate(90deg); }
    .content-group-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      min-width: 0;
      flex: 1;
    }
    .content-group-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
    }
    .content-agent-name {
      font: 600 15px var(--font-display);
      letter-spacing: 0.01em;
      text-transform: none;
      line-height: 1.3;
    }
    .content-group-summary {
      font: 500 11px var(--font-mono);
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .content-group-preview {
      font: 400 12px var(--font-display);
      color: var(--text-muted);
      line-height: 1.4;
      opacity: 0.8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .content-group-docs {
      display: none;
      padding: 8px 16px 14px;
      gap: 4px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .content-group-open .content-group-docs { display: flex; flex-direction: column; }
    .content-doc-item {
      padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
      cursor: pointer; border-left: 2px solid transparent;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .content-doc-item:hover { background: rgba(255,255,255,0.04); }
    .content-doc-item.selected {
      background: rgba(255,255,255,0.06);
      border-left-color: var(--agent-color, var(--brand-cyan));
      box-shadow: inset 0 0 20px rgba(139,92,246,0.05);
    }
    .content-doc-item button {
      width: 100%;
      text-align: left;
      border: none;
      background: none;
      color: inherit;
      padding: 0;
      cursor: pointer;
      font: inherit;
    }
    .content-doc-title { font: 500 13px var(--font-display); color: var(--text-primary); }
    .content-doc-filename { font: 400 var(--font-size-xs) var(--font-mono); color: var(--text-muted); }
    .content-preview-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--space-3);
    }
    .content-preview-title { font: 500 var(--font-size-xl) var(--font-display); }
    .content-preview-body {
      font: 400 var(--font-size-base) var(--font-display); line-height: 1.75;
      color: var(--text-primary);
    }
    .content-preview-body h1, .content-preview-body h2, .content-preview-body h3 {
      font-family: var(--font-display); color: var(--text-primary);
      margin: var(--space-4) 0 var(--space-2);
    }
    .content-preview-body h1 { font-size: var(--font-size-xl); }
    .content-preview-body h2 { font-size: var(--font-size-lg); }
    .content-preview-body h3 { font-size: var(--font-size-base); }
    .content-preview-body code {
      background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: var(--radius-sm);
      font: 400 var(--font-size-sm) var(--font-mono);
    }
    .content-preview-body pre {
      background: rgba(0,0,0,0.35); padding: var(--space-3); border-radius: var(--radius-md);
      overflow-x: auto; margin: var(--space-3) 0;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .content-preview-body pre code { background: none; padding: 0; }
    .content-preview-body ul, .content-preview-body ol { padding-left: var(--space-4); margin: var(--space-2) 0; }
    .content-preview-body li { margin-bottom: var(--space-1); }
    .content-preview-body blockquote {
      border-left: 3px solid var(--brand-violet); padding-left: var(--space-3);
      color: var(--text-muted); margin: var(--space-3) 0;
      background: rgba(139,92,246,0.05); padding: var(--space-2) var(--space-3);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }
    .content-editor {
      width: 100%; min-height: 50vh;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font: 400 var(--font-size-sm) var(--font-mono);
      padding: var(--space-3); resize: vertical;
      backdrop-filter: blur(8px);
    }
    .content-editor:focus {
      outline: none;
      border-color: rgba(139,92,246,0.4);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #8B5CF6, #A78BFA);
      color: white; border: none;
      padding: 8px 16px; border-radius: var(--radius-md);
      font: 500 var(--font-size-sm) var(--font-mono); cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 16px rgba(139,92,246,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(139,92,246,0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted); padding: 8px 16px; border-radius: var(--radius-md);
      font: 500 var(--font-size-sm) var(--font-mono); cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18);
      color: var(--text-primary);
    }

    .empty-state {
      text-align: center; padding: var(--space-6);
      font: 400 var(--font-size-sm) var(--font-mono); color: var(--text-muted);
    }

    .add-task-form {
      background: rgba(31,31,43,0.5);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: var(--space-3); margin-top: var(--space-2);
    }
    .add-task-form input, .add-task-form select, .add-task-form textarea {
      width: 100%; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font: 400 var(--font-size-sm) var(--font-mono); padding: 8px 12px;
      margin-bottom: var(--space-2);
      backdrop-filter: blur(8px);
      transition: border-color 0.2s ease;
    }
    .add-task-form input:focus, .add-task-form select:focus, .add-task-form textarea:focus {
      outline: none; border-color: rgba(139,92,246,0.4);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
    }
    .add-task-form textarea { min-height: 60px; resize: vertical; }

    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      font: 500 var(--font-size-xs) var(--font-mono);
      color: var(--text-muted); letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase; text-align: left; padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .log-table td {
      font: 400 var(--font-size-sm) var(--font-mono);
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text-primary);
    }

    .filter-row { display: flex; gap: var(--space-1); margin-bottom: var(--space-3); flex-wrap: wrap; }
    .filter-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-full); padding: 5px 14px;
      font: 500 var(--font-size-xs) var(--font-mono); color: var(--text-muted);
      cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: var(--letter-spacing-wide); text-transform: uppercase;
    }

<script type="module">
import { GlassCard, Badge, StatCard, ProgressBar, ThinBar, DonutChart, drawDonut } from './components.js';

// ══════════════════════════════════════════════════════════════
// THEME TOGGLE
// ══════════════════════════════════════════════════════════════
const savedTheme = localStorage.getItem('agentos-theme') || 'dark';
if (savedTheme === 'light') document.documentElement.classList.add('light');

window.toggleTheme = function() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('agentos-theme', isLight ? 'light' : 'dark');
  // Update Three.js particle colors for light mode
  if (window._updateParticleColors) window._updateParticleColors(isLight);
};

// ══════════════════════════════════════════════════════════════
// THREE.JS PARTICLE BACKGROUND
// ══════════════════════════════════════════════════════════════
(function initThreeBackground() {
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 50;

  // Particles
  const PARTICLE_COUNT = 800;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const colors = new Float32Array(PARTICLE_COUNT * 3);
  const sizes = new Float32Array(PARTICLE_COUNT);
  const velocities = [];

  const palette = [
    [0.545, 0.361, 0.965], // violet
    [0.490, 0.827, 0.988], // cyan
    [0.369, 0.886, 0.710], // mint
    [0.906, 0.451, 0.714], // pink
    [0.910, 0.475, 0.976], // magenta
  ];

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 100;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 60;
    const c = palette[Math.floor(Math.random() * palette.length)];
    colors[i * 3] = c[0];
    colors[i * 3 + 1] = c[1];
    colors[i * 3 + 2] = c[2];
    sizes[i] = Math.random() * 2 + 0.5;
    velocities.push({
      x: (Math.random() - 0.5) * 0.02,
      y: (Math.random() - 0.5) * 0.02,
      z: (Math.random() - 0.5) * 0.01,
    });
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const vertexShader = `
    attribute float size;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (50.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `;
  const fragmentShader = `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = 1.0 - smoothstep(0.2, 0.5, d);
      gl_FragColor = vec4(vColor, alpha * 0.6);
    }
  `;

  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    transparent: true,
    vertexColors: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // Floating lines
  const LINE_COUNT = 20;
  const lines = [];
  for (let i = 0; i < LINE_COUNT; i++) {
    const pts = [];
    const start = new THREE.Vector3(
      (Math.random() - 0.5) * 80,
      (Math.random() - 0.5) * 80,
      (Math.random() - 0.5) * 40
    );
    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5)
    ).normalize();
    const len = 5 + Math.random() * 15;
    pts.push(start, start.clone().add(dir.multiplyScalar(len)));

    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const c = palette[Math.floor(Math.random() * palette.length)];
    const lineMat = new THREE.LineBasicMaterial({
      color: new THREE.Color(c[0], c[1], c[2]),
      transparent: true,
      opacity: 0.08,
    });
    const line = new THREE.Line(lineGeo, lineMat);
    scene.add(line);
    lines.push({ line, vel: new THREE.Vector3((Math.random()-0.5)*0.01, (Math.random()-0.5)*0.01, 0) });
  }

  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  function animate() {
    requestAnimationFrame(animate);

    const pos = geometry.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      pos[i * 3] += velocities[i].x;
      pos[i * 3 + 1] += velocities[i].y;
      pos[i * 3 + 2] += velocities[i].z;
      if (Math.abs(pos[i * 3]) > 55) velocities[i].x *= -1;
      if (Math.abs(pos[i * 3 + 1]) > 55) velocities[i].y *= -1;
      if (Math.abs(pos[i * 3 + 2]) > 35) velocities[i].z *= -1;
    }
    geometry.attributes.position.needsUpdate = true;

    particles.rotation.y += 0.0003;
    particles.rotation.x += 0.0001;

    camera.position.x += (mouseX * 3 - camera.position.x) * 0.02;
    camera.position.y += (-mouseY * 3 - camera.position.y) * 0.02;
    camera.lookAt(0, 0, 0);

    lines.forEach(l => {
      l.line.position.add(l.vel);
    });

    renderer.render(scene, camera);
  }
  animate();

  // Theme-aware particle colors
  const darkPalette = [
    [0.545, 0.361, 0.965], [0.490, 0.827, 0.988], [0.369, 0.886, 0.710],
    [0.906, 0.451, 0.714], [0.910, 0.475, 0.976],
  ];
  const lightPalette = [
    [0.486, 0.227, 0.929], [0.055, 0.647, 0.914], [0.063, 0.725, 0.506],
    [0.925, 0.282, 0.600], [0.851, 0.275, 0.937],
  ];
  window._updateParticleColors = function(isLight) {
    const pal = isLight ? lightPalette : darkPalette;
    const col = geometry.attributes.color.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const c = pal[Math.floor(Math.random() * pal.length)];
      col[i * 3] = c[0]; col[i * 3 + 1] = c[1]; col[i * 3 + 2] = c[2];
    }
    geometry.attributes.color.needsUpdate = true;
  };

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// ══════════════════════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('navClock').textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════════════════════════════════
// TAB SWITCHING WITH DISSOLVE
// ══════════════════════════════════════════════════════════════
let currentTab = 'overview';
function switchTab(name) {
  if (name === currentTab) return;
  const oldPanel = document.getElementById('tab-' + currentTab);
  const newPanel = document.getElementById('tab-' + name);

  oldPanel.classList.add('vanish-out');
  setTimeout(() => {
    oldPanel.classList.remove('active', 'vanish-out');
    newPanel.classList.add('active', 'dissolving');
    setTimeout(() => newPanel.classList.remove('dissolving'), 700);
  }, 350);

  currentTab = name;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');

  if (name === 'overview') renderOverviewIfChanged(lastSnapshot, true);
  if (name === 'agents') renderWorkspacesIfChanged(lastSnapshot, true);
  if (name === 'tasks') loadTasks();
  if (name === 'schedule') renderScheduleIfChanged(lastSnapshot, true);
  if (name === 'content') loadContentDocs();
}
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ══════════════════════════════════════════════════════════════
// VERSION BADGE
// ══════════════════════════════════════════════════════════════
const VERSION = 'v1.0';
document.getElementById('versionBadge').innerHTML = Badge({ text: VERSION, color: 'var(--text-muted)', variant: 'subtle' });

// ══════════════════════════════════════════════════════════════
// AGENT CONFIG
// ══════════════════════════════════════════════════════════════
const AGENTS = {
  orchestrator: { label: 'ORCH', name: 'Orchestrator', color: 'var(--agent-orchestrator)', role: 'Cross-platform coordinator & system architect', platform: 'Telegram' },
  analyst: { label: 'ANAL', name: 'Analyst', color: 'var(--agent-analyst)', role: 'Deep research specialist & trend intelligence', platform: 'Discord' },
  writer: { label: 'WRTR', name: 'Writer', color: 'var(--agent-writer)', role: 'Content writer & SEO specialist', platform: 'Discord' },
  marketer: { label: 'MRKT', name: 'Marketer', color: 'var(--agent-marketer)', role: 'Marketing strategist & growth hacker', platform: 'Discord' },
  coder: { label: 'CODR', name: 'Coder', color: 'var(--agent-coder)', role: 'Full-stack developer & automation engineer', platform: 'Discord' },
};

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function relativeTime(iso) {
  if (!iso) return 'never';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function staggerDelay(index) {
  return `animation-delay: ${index * 80}ms;`;
}

const CONTENT_COLORS = ['var(--brand-violet)', 'var(--brand-cyan)', 'var(--brand-gold)', 'var(--brand-magenta)', 'var(--brand-teal)', 'var(--status-active)'];
function hashString(value) {
  let hash = 0;
  for (let i = 0; i < value.length; i++) hash = ((hash << 5) - hash) + value.charCodeAt(i);
  return Math.abs(hash);
}
function contentGroupColor(value) {
  return CONTENT_COLORS[hashString(String(value || 'content')) % CONTENT_COLORS.length];
}

// ══════════════════════════════════════════════════════════════
// OVERVIEW TAB
// ══════════════════════════════════════════════════════════════
function renderOverview(d) {
  if (!d) return;
  const vps = d.vps || {};
  const sessions = d.sessions || {};
  const gw = d.gateway || {};
  const workspaces = (d.workspaces || []).slice().sort((a,b) => (b.sessions||0) - (a.sessions||0));
  const palette = ['var(--brand-violet)','var(--brand-cyan)','var(--brand-gold)','var(--brand-magenta)','var(--brand-teal)','var(--status-active)'];

  const totalWorkspaceSessions = workspaces.reduce((sum, w) => sum + (w.sessions || 0), 0);
  const totalMessages = workspaces.reduce((sum, w) => sum + (w.messages || 0), 0);
  const totalTools = workspaces.reduce((sum, w) => sum + (w.tools || 0), 0);
  const dirtyRepos = workspaces.filter(w => w.repo_info && w.repo_info.dirty).length;
  const reposFound = workspaces.filter(w => w.repo_info && w.repo_info.exists).length;
  const activeWorkspaces = workspaces.filter(w => (w.sessions || 0) > 0).length;
  const topWorkspace = workspaces[0];
  const latestWorkspace = workspaces.slice().sort((a,b) => (b.last_activity || 0) - (a.last_activity || 0))[0];

  const cpuColor = vps.cpu > 85 ? 'var(--brand-red)' : vps.cpu > 70 ? 'var(--brand-amber)' : 'var(--brand-cyan)';
  const ramColor = vps.ram_pct > 85 ? 'var(--brand-red)' : vps.ram_pct > 70 ? 'var(--brand-amber)' : 'var(--brand-cyan)';
  const diskColor = vps.disk_pct > 85 ? 'var(--brand-red)' : vps.disk_pct > 70 ? 'var(--brand-amber)' : 'var(--brand-cyan)';
  const uptime = gw.uptime || 'N/A';

  const maxSessions = Math.max(...workspaces.map(w => w.sessions || 0), 1);
  const radarDots = workspaces.map((w, i) => {
    const angle = (i / Math.max(workspaces.length, 1)) * 2 * Math.PI - Math.PI/2;
    const r = 28 + ((w.sessions || 0) / maxSessions) * 34;
    const x = 70 + Math.cos(angle) * r;
    const y = 70 + Math.sin(angle) * r;
    const color = palette[i % palette.length];
    return `<g>
      <circle cx="${x}" cy="${y}" r="${4 + Math.min(4, (w.sessions || 0) / maxSessions * 4)}" fill="${color}" opacity="0.92"><animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite" begin="${i*0.25}s"/></circle>
      <text x="${x}" y="${y + 16}" text-anchor="middle" fill="var(--text-muted)" style="font: 500 7px var(--font-mono);">${w.label || w.key}</text>
    </g>`;
  }).join('');

  const workspaceBars = workspaces.map((w, i) => {
    const fill = Math.round(((w.sessions || 0) / maxSessions) * 100);
    const color = palette[i % palette.length];
    const repo = w.repo_info || {};

    return `<div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:6px;">

      <div style="flex:1;">${ProgressBar({ pct: fill, color, height: '5px' })}</div>
      <span style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);width:94px;text-align:right;">${w.sessions || 0} · ${repoState}</span>
    </div>`;
  }).join('');

  const recentSessions = (sessions.recent || []).slice(0, 8).map((s, i) => {
    const title = s.title || s.id || 'untitled session';
    const source = (s.source || 'session').toUpperCase();
    return `<div class="dissolve-in" style="display:flex;align-items:center;gap:var(--space-2);padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);${staggerDelay(i)}">
      ${Badge({ text: source.slice(0,4), color: 'var(--brand-cyan)', variant: 'solid' })}
      <span style="font:400 var(--font-size-sm) var(--font-mono);color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${title}">${title}</span>
      <span style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">${relativeUnix(s.started_at)}</span>
    </div>`;
  }).join('');

  const repoGrid = workspaces.map((w, i) => {
    const repo = w.repo_info || {};
    const color = repo.exists ? (repo.dirty ? 'var(--brand-amber)' : 'var(--status-active)') : 'var(--status-error)';
    return `<div class="dissolve-in" style="padding:var(--space-3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-md);background:rgba(255,255,255,0.03);${staggerDelay(i)}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-2);margin-bottom:6px;">
        ${Badge({ text: w.label || w.key, color: palette[i % palette.length], variant: 'solid' })}
        <span style="font:500 var(--font-size-xs) var(--font-mono);color:${color};">${repo.exists ? (repo.dirty ? 'dirty' : 'clean') : 'missing'}</span>
      </div>
      <div style="font:500 var(--font-size-sm) var(--font-display);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${w.name}</div>
      <div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${repo.last_commit || repo.path || ''}">${repo.branch || '—'} · ${w.sessions || 0} sessions</div>
    </div>`;
  }).join('');

  document.getElementById('opsConsole').innerHTML = `
    <div class="grid-ops">
      <div class="ops-column" style="align-items:center;">
        <svg viewBox="0 0 140 140" width="180" height="180" style="overflow:visible;">
          <defs>
            <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="var(--brand-violet)" stop-opacity="0.12"/>
              <stop offset="100%" stop-color="transparent"/>

          <circle cx="70" cy="70" r="65" fill="url(#radarGlow)"/>
          <circle cx="70" cy="70" r="60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <circle cx="70" cy="70" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
          <circle cx="70" cy="70" r="30" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
          <line x1="10" y1="70" x2="130" y2="70" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
          <line x1="70" y1="10" x2="70" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
          <line x1="70" y1="70" x2="70" y2="10" stroke="var(--brand-cyan)" stroke-width="1.5" opacity="0.45">
            <animate attributeName="x2" values="70;92.96;112.43;125.43;130;125.43;112.43;92.96;70;47.04;27.57;14.57;10;14.57;27.57;47.04;70" dur="10s" repeatCount="indefinite"/>
            <animate attributeName="y2" values="10;14.57;27.57;47.04;70;92.96;112.43;125.43;130;125.43;112.43;92.96;70;47.04;27.57;14.57;10" dur="10s" repeatCount="indefinite"/>
          </line>

        </svg>
      </div>
      <div class="ops-column">
        <div class="ops-label">FOCUS</div>
        <div style="font:500 var(--font-size-sm) var(--font-mono);color:var(--brand-cyan);margin-bottom:var(--space-3);text-shadow:0 0 20px rgba(125,211,252,0.3);">
          ${latestWorkspace ? `${latestWorkspace.name} · ${relativeUnix(latestWorkspace.last_activity)}` : 'No workspace activity yet'}
        </div>
        <div class="ops-label" style="margin-top:var(--space-2);">WORKSPACE LOAD</div>
        ${workspaceBars || '<div class="empty-state">No workspaces configured</div>'}
      </div>
      <div class="ops-column">
        <div class="ops-label">HOST HEALTH</div>
        <div style="display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-3);">
          <div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">CPU ${vps.cpu || 0}%</div>${ProgressBar({ pct: vps.cpu || 0, color: cpuColor })}</div>
          <div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">RAM ${vps.ram_pct || 0}%</div>${ProgressBar({ pct: vps.ram_pct || 0, color: ramColor })}</div>
          <div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">DISK ${vps.disk_pct || 0}%</div>${ProgressBar({ pct: vps.disk_pct || 0, color: diskColor })}</div>

      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-2);margin-top:var(--space-3);">${repoGrid}</div>

}

// ══════════════════════════════════════════════════════════════
// AGENTS TAB
// ══════════════════════════════════════════════════════════════
function renderAgents(d) {
  if (!d) return;
  const workspaces = (d.workspaces || []).slice().sort((a,b) => (b.sessions||0) - (a.sessions||0));
  const totalSessions = Math.max(workspaces.reduce((sum, w) => sum + (w.sessions || 0), 0), 1);
  const active = workspaces.filter(w => (w.sessions || 0) > 0).length;
  const dirty = workspaces.filter(w => w.repo_info && w.repo_info.dirty).length;

  document.getElementById('agentCounts').innerHTML = GlassCard({
    children: `<div style="display:flex;gap:var(--space-4);">
      <div style="text-align:center;"><div style="font:700 var(--font-size-lg) var(--font-mono);color:var(--status-active);text-shadow:0 0 15px rgba(94,226,181,0.4);">${active}</div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">Active</div></div>
      <div style="text-align:center;"><div style="font:700 var(--font-size-lg) var(--font-mono);color:${dirty ? 'var(--brand-amber)' : 'var(--status-idle)'};">${dirty}</div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">Dirty Repos</div></div>
    </div>`,
    style: 'padding: var(--space-3);'
  });

  const palette = ['var(--brand-violet)','var(--brand-cyan)','var(--brand-gold)','var(--brand-magenta)','var(--brand-teal)','var(--status-active)','var(--brand-amber)'];
  document.getElementById('agentCards').innerHTML = workspaces.map((w, idx) => {
    const color = palette[idx % palette.length];
    const repo = w.repo_info || {};
    const sessionPct = ((w.sessions || 0) / totalSessions) * 100;
    const statusColor = repo.exists ? (repo.dirty ? 'var(--brand-amber)' : 'var(--status-active)') : 'var(--status-error)';
    const statusText = repo.exists ? (repo.dirty ? 'dirty' : 'clean') : 'missing';
    const latest = w.latest_session || {};
    const lastLabel = w.last_activity ? relativeUnix(w.last_activity) : 'never';
    const branch = repo.branch || '—';
    const language = repo.language || 'repo';

    return `<div class="agent-card dissolve-in" style="--agent-color:${color};${staggerDelay(idx)}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);">
        ${Badge({ text: w.label || w.key?.slice(0,4).toUpperCase() || 'WORK', color, variant: 'solid' })}
        <div style="display:flex;align-items:center;gap:var(--space-2);">
          <span style="font:400 var(--font-size-xs) var(--font-mono);color:var(--brand-cyan);">${w.discord || 'Discord'}</span>
          <div style="width:6px;height:6px;border-radius:50%;background:${statusColor};box-shadow:0 0 8px ${statusColor};${w.sessions > 0 ? 'animation:pulse 2s ease infinite;' : ''}"></div>
        </div>
      </div>
      <div style="font:500 var(--font-size-lg) var(--font-display);margin-bottom:2px;">${w.name}</div>
      <div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);margin-bottom:var(--space-2);min-height:34px;">${w.description || ''}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2);margin-top:var(--space-2);">
        <div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">Sessions</div><div style="font:500 var(--font-size-sm) var(--font-mono);">${w.sessions || 0}</div></div>
        <div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">Branch</div><div style="font:500 var(--font-size-sm) var(--font-mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${branch}">${branch}</div></div>
        <div><div style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">Repo</div><div style="font:500 var(--font-size-sm) var(--font-mono);color:${statusColor};">${statusText}</div></div>
      </div>
      <div style="margin-top:var(--space-2);">${ProgressBar({ pct: sessionPct, color, height: '3px' })}</div>
      <div style="margin-top:var(--space-2);display:flex;justify-content:space-between;gap:var(--space-2);font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">
        <span>${language}</span><span>${lastLabel}</span>
      </div>
      ${latest.title ? `<div style="margin-top:var(--space-2);font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${latest.title}">↳ ${latest.title}</div>` : ''}
      ${repo.last_commit ? `<div style="margin-top:4px;font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${repo.last_commit}">git ${repo.last_commit}</div>` : ''}
    </div>`;
  }).join('');

  const filters = ['ALL', ...workspaces.map(w => w.label || w.key.toUpperCase())];
  document.getElementById('logFilters').innerHTML = filters.map((name, i) => {
    const filter = i === 0 ? 'all' : workspaces[i-1].key;
    return `<button class="filter-btn ${i===0?'active':''}" data-filter="${filter}">${name}</button>`;
  }).join('');
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWorkspaceTable(workspaces, btn.dataset.filter);
    });
  });
  renderWorkspaceTable(workspaces, 'all');

  const totalMessages = workspaces.reduce((sum, w) => sum + (w.messages || 0), 0);
  const totalTools = workspaces.reduce((sum, w) => sum + (w.tools || 0), 0);
  const topWorkspace = workspaces[0];
  const existingRepos = workspaces.filter(w => w.repo_info && w.repo_info.exists).length;

  document.getElementById('agentStats').innerHTML = [
    StatCard({ label: 'WORKSPACES', value: workspaces.length, accent: 'var(--brand-cyan)', barWidth: '100%' }),
    StatCard({ label: 'DISCORD SESSIONS', value: totalSessions, accent: 'var(--brand-violet)', barWidth: '100%' }),
    StatCard({ label: 'MESSAGES', value: totalMessages, accent: 'var(--brand-gold)', barWidth: '100%' }),
    StatCard({ label: 'REPOS FOUND', value: `${existingRepos}/${workspaces.length}`, accent: existingRepos === workspaces.length ? 'var(--status-active)' : 'var(--brand-amber)', barWidth: Math.round((existingRepos / Math.max(workspaces.length, 1))*100)+'%' }),
  ].join('');

  requestAnimationFrame(() => {
    const canvas = document.getElementById('donutCanvas');
    if (!canvas) return;
    const slices = workspaces.map((w, idx) => ({
      color: palette[idx % palette.length],
      value: w.sessions || 0,
      label: w.label || w.key,
    }));
    canvas.dataset.slices = JSON.stringify(slices);
    canvas.dataset.total = totalSessions;
    drawDonut(canvas);

    document.getElementById('donutLegend').innerHTML = slices.map(s => {
      const pct = totalSessions > 0 ? Math.round((s.value / totalSessions) * 100) : 0;
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;">
        <div style="display:flex;align-items:center;gap:var(--space-2);">
          <div style="width:8px;height:8px;border-radius:50%;background:${s.color};box-shadow:0 0 8px ${s.color};"></div>
          <span style="font:400 var(--font-size-xs) var(--font-mono);">${s.label}</span>
        </div>
        <span style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">${pct}%</span>
      </div>`;
    }).join('');
  });
}

function relativeUnix(ts) {
  if (!ts) return 'never';
  const seconds = Number(ts) > 100000000000 ? Number(ts) / 1000 : Number(ts);
  const diff = (Date.now() / 1000) - seconds;
  if (diff < 60) return `${Math.max(0, Math.floor(diff))}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function renderWorkspaceTable(workspaces, filter) {
  const filtered = filter === 'all' ? workspaces : workspaces.filter(w => w.key === filter);
  document.getElementById('logBody').innerHTML = filtered.map((w, i) => {
    const repo = w.repo_info || {};
    const color = repo.exists ? (repo.dirty ? 'var(--brand-amber)' : 'var(--status-active)') : 'var(--status-error)';
    return `<tr class="dissolve-in" style="${staggerDelay(i)}">
      <td style="color:var(--text-muted);">${w.last_activity ? relativeUnix(w.last_activity) : 'never'}</td>
      <td>${Badge({ text: w.label || w.key?.slice(0,4).toUpperCase() || 'WORK', color: 'var(--brand-cyan)', variant: 'solid' })}</td>
      <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${w.description || ''}">${w.name}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${color};" title="${repo.path || ''}">${repo.branch || '—'} ${repo.dirty ? '• dirty' : ''}</td>
      <td>${w.sessions || 0} / ${w.messages || 0} msgs / ${w.tools || 0} tools</td>
    </tr>`;
  }).join('');
}

function byDaySum(days) {
  return (days || []).reduce((sum, d) => sum + (d.total || 0), 0);
}

function renderLogTable(entries, filter) {
  const filtered = filter === 'all' ? entries : entries.filter(e => e.agent_name === filter);
  document.getElementById('logBody').innerHTML = filtered.slice(0, 50).map((e, i) => {
    const cfg = AGENTS[e.agent_name] || { color: 'var(--text-muted)', label: (e.agent_name||'?').slice(0,4).toUpperCase() };
    const statusColor = e.status === 'completed' ? 'var(--status-active)' : 'var(--status-error)';
    return `<tr class="dissolve-in" style="${staggerDelay(i)}">
      <td style="color:var(--text-muted);">${relativeTime(e.created_at)}</td>
      <td>${Badge({ text: cfg.label, color: cfg.color, variant: 'solid' })}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.task_description || ''}</td>
      <td style="color:var(--text-muted);">${e.model_used || '—'}</td>
      <td>${Badge({ text: e.status, color: statusColor, variant: 'solid' })}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════
// TASKS TAB
// ══════════════════════════════════════════════════════════════
let boardData = [];
async function loadTasks() {
  try {
    const res = await fetch('api/board');
    boardData = await res.json();
  } catch(e) { boardData = []; }
  renderTaskBoard();
}

function renderTaskBoard() {
  const cols = ['pending', 'in_progress', 'done'];
  const labels = ['Pending', 'In Progress', 'Done'];
  document.getElementById('taskBoard').innerHTML = cols.map((col, i) => {
    const tasks = boardData.filter(t => t.status === col);
    const addBtn = col === 'pending' ? `<button class="btn-secondary" style="font-size:11px;padding:3px 10px;" onclick="showAddTask()">+ Add</button>` : '';
    const cards = tasks.map((t, ti) => `
      <div class="task-card dissolve-in" style="${staggerDelay(ti)}">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="task-title">${t.title}</div>
          <span class="priority-chip priority-${t.priority}">${t.priority}</span>
        </div>
        ${t.notes ? `<div class="task-notes">${t.notes}</div>` : ''}
        <div class="task-footer">
          <span class="task-time">${relativeTime(t.created_at)}</span>
          <div class="task-actions">
            ${col !== 'pending' ? `<button class="task-btn" onclick="moveTask('${t.id}','${col === 'done' ? 'in_progress' : 'pending'}')">◀</button>` : ''}
            ${col !== 'done' ? `<button class="task-btn" onclick="moveTask('${t.id}','${col === 'pending' ? 'in_progress' : 'done'}')">▶</button>` : ''}
            <button class="task-btn" onclick="deleteTask('${t.id}')">✕</button>
          </div>
        </div>
      </div>
    `).join('');
    return GlassCard({
      children: `<div class="task-column-header">${labels[i]} ${Badge({ text: String(tasks.length), color: 'var(--text-muted)', variant: 'subtle' })} ${addBtn}</div><div id="col-${col}">${cards || '<div class="empty-state" style="padding:var(--space-4);">No tasks</div>'}</div>`,
      style: 'padding: var(--space-3);'
    });
  }).join('') + '<div id="addTaskContainer"></div>';
}

window.showAddTask = function() {
  document.getElementById('addTaskContainer').innerHTML = `
    <div class="add-task-form dissolve-in" style="margin-top:var(--space-3);">
      <input type="text" id="newTaskTitle" placeholder="Task title..." autofocus>
      <select id="newTaskPriority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select>
      <textarea id="newTaskNotes" placeholder="Notes (optional)"></textarea>
      <div style="display:flex;gap:var(--space-2);">
        <button class="btn-primary" onclick="submitTask()">Save</button>
        <button class="btn-secondary" onclick="document.getElementById('addTaskContainer').innerHTML=''">Cancel</button>
      </div>
    </div>`;
};

window.submitTask = async function() {
  const title = document.getElementById('newTaskTitle').value.trim();
  if (!title) return;
  const priority = document.getElementById('newTaskPriority').value;
  const notes = document.getElementById('newTaskNotes').value.trim();
  await fetch('api/board', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ title, priority, notes }) });
  document.getElementById('addTaskContainer').innerHTML = '';
  loadTasks();
};

window.moveTask = async function(id, newStatus) {
  await fetch('api/board/update?id=' + id, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: newStatus }) });
  loadTasks();
};

window.deleteTask = async function(id) {
  await fetch('api/board/delete?id=' + id, { method: 'POST' });
  loadTasks();
};

// ══════════════════════════════════════════════════════════════
// SCHEDULE TAB
// ══════════════════════════════════════════════════════════════
function renderSchedule(d) {
  if (!d) return;
  const crons = d.crons || [];
  const hermes = crons.filter(c => c.owner === 'hermes');
  const system = crons.filter(c => c.owner !== 'hermes');

  const renderCronGroup = (jobs, label, color) => {
    if (jobs.length === 0) return `<div class="section-eyebrow" style="margin-bottom:var(--space-3);">${label}</div><div class="empty-state">No scheduled jobs in this group.</div>`;
    return `<div class="section-eyebrow" style="margin-bottom:var(--space-3);">${label}</div>` +
      jobs.map((j, i) => GlassCard({
        children: `<div class="dissolve-in" style="${staggerDelay(i)}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-2);">
          <div class="cron-cmd" title="${j.command}">${j.command}</div>
          ${Badge({ text: j.owner, color: color, variant: 'subtle' })}
        </div>
        <div style="display:flex;gap:var(--space-4);margin-bottom:var(--space-1);">
          <div><span style="font:500 var(--font-size-xs) var(--font-mono);color:var(--text-muted);text-transform:uppercase;">Schedule </span><span class="cron-schedule">${j.schedule}</span></div>
        </div>
        <div class="cron-desc">${j.description}</div>
        <div class="cron-source" style="margin-top:var(--space-2);">${j.source}</div></div>`,
        style: 'padding: var(--space-3);'
      })).join('');
  };

  document.getElementById('scheduleContent').innerHTML =
    renderCronGroup(hermes, 'HERMES JOBS', 'var(--brand-violet)') +
    '<div style="margin-top:var(--space-4);"></div>' +
    renderCronGroup(system, 'SYSTEM JOBS', 'var(--text-muted)');
}

// ══════════════════════════════════════════════════════════════
// CONTENT TAB
// ══════════════════════════════════════════════════════════════
let contentDocs = [];
let selectedDoc = null;
let contentExpandedGroups = new Set();
let contentSidebarInitialized = false;

function contentGroupKey(doc) {
  return doc?.group || 'content';
}

function setOnlyContentGroupOpen(group) {
  contentExpandedGroups = new Set(group ? [group] : []);
}

function ensureSelectedGroupOpen() {
  if (selectedDoc) {
    const group = contentGroupKey(selectedDoc);
    if (group) contentExpandedGroups.add(group);
  }
}

function installContentSidebarHandlers() {
  const sidebar = document.getElementById('contentSidebar');
  if (!sidebar || sidebar.dataset.bound === '1') return;
  sidebar.dataset.bound = '1';
  sidebar.addEventListener('click', (event) => {
    const docBtn = event.target.closest('[data-content-path]');
    if (docBtn) {
      event.preventDefault();
      const path = docBtn.dataset.contentPath;
      if (path) selectDoc(path);
    }
  });
}

async function loadContentDocs() {
  try {
    const res = await fetch('api/content');
    contentDocs = await res.json();
  } catch(e) { contentDocs = []; }
  installContentSidebarHandlers();

  if (!contentDocs.length) {
    selectedDoc = null;
    contentExpandedGroups = new Set();
    contentSidebarInitialized = false;
    renderContentSidebar();
    document.getElementById('contentPanel').innerHTML = '<div class="empty-state">No markdown files found in project repos or Hermes content</div>';
    return;
  }

  if (!contentDocs.some(d => d.path === selectedDoc?.path)) {
    selectedDoc = null;
    contentExpandedGroups = new Set();
    renderContentSidebar();
    document.getElementById('contentPanel').innerHTML = '<div class="empty-state">Select a document to read</div>';
    return;
  }

  renderContentSidebar();
}

function escapeAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderContentSidebar() {
  const grouped = {};
  contentDocs.forEach(d => {
    const key = contentGroupKey(d);
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });

  const groups = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
  ensureSelectedGroupOpen();

  document.getElementById('contentSidebar').innerHTML = groups.map(group => {
    const docs = grouped[group] || [];
    const color = contentGroupColor(group);
    const isOpen = contentExpandedGroups.has(group);
    const preview = docs.slice(0, 2).map(d => d.title || d.filename).join(' • ');
    const groupEsc = escapeAttr(group);
    const previewEsc = escapeHtml(preview);
    return `<div class="content-agent-group ${isOpen ? 'content-group-open' : ''}">
      <button class="content-group-toggle" type="button" onclick="toggleContentGroup('${groupEsc}')">
        <span class="content-group-chevron">›</span>
        <span class="content-group-meta">
          <div class="content-group-header">
            <span class="content-agent-name" style="color:${color};">${escapeHtml(group)}</span>
            ${Badge({ text: String(docs.length), color, variant: 'subtle' })}
          </div>
          <span class="content-group-summary">${selectedDoc && contentGroupKey(selectedDoc) === group ? 'open' : 'click to open'}</span>
          <span class="content-group-preview">${previewEsc || 'No document preview available'}</span>
        </span>
      </button>
      <div class="content-group-docs">
        ${docs.map(d => `
          <div class="content-doc-item ${selectedDoc?.path === d.path ? 'selected' : ''}" style="--agent-color:${color};">
            <button type="button" onclick="selectDoc('${escapeAttr(d.path)}')">
              <div class="content-doc-title">${escapeHtml(d.title)}</div>
              <div class="content-doc-filename">${escapeHtml(d.filename)}</div>
            </button>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('') || '<div class="empty-state">No documents yet</div>';
}

window.toggleContentGroup = function(group) {
  contentSidebarInitialized = true;
  if (contentExpandedGroups.has(group)) contentExpandedGroups.delete(group);
  else contentExpandedGroups.add(group);
  renderContentSidebar();
};

window.selectDoc = async function(path) {
  selectedDoc = contentDocs.find(d => d.path === path) || { path };
  setOnlyContentGroupOpen(contentGroupKey(selectedDoc));
  contentSidebarInitialized = true;
  renderContentSidebar();
  window.scrollTo({ top: 0, behavior: 'instant' });
  try {
    const res = await fetch('api/content/get?path=' + encodeURIComponent(path));
    const data = await res.json();
    const doc = contentDocs.find(d => d.path === path);
    const editable = !!doc?.editable && !!data.editable;
    const color = contentGroupColor(doc?.group || 'content');
    document.getElementById('contentPanel').innerHTML = `
      <div class="content-preview-header dissolve-in">
        <div>
          <div class="content-preview-title">${doc?.title || path}</div>
          <div style="display:flex;gap:var(--space-2);align-items:center;margin-top:4px;flex-wrap:wrap;">
            ${Badge({ text: (doc?.group || 'CONTENT').toUpperCase(), color, variant: 'solid' })}
            <span style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);">${doc?.modified_at ? relativeTime(doc.modified_at) : ''}</span>
            ${editable ? '' : '<span style="font:400 var(--font-size-xs) var(--font-mono);color:var(--text-muted);opacity:0.7;">read only</span>'}
          </div>
        </div>
        <div style="display:flex;gap:var(--space-2);">
          <button class="btn-secondary" id="viewBtn" onclick="showViewMode()">View</button>
          ${editable ? '<button class="btn-secondary" id="editBtn" onclick="showEditMode()">Edit</button>' : ''}
        </div>
      </div>
      <div id="contentBody" class="content-preview-body dissolve-in" style="animation-delay:100ms;">${marked.parse(data.content || '')}</div>
      <div id="editArea" style="display:none;"></div>
    `;
    window._currentContent = data.content || '';
    window._currentPath = path;
    window._currentEditable = editable;
  } catch(e) {
    document.getElementById('contentPanel').innerHTML = '<div class="empty-state">Failed to load document</div>';
  }
};

window.showViewMode = function() {
  const body = document.getElementById('contentBody');
  const edit = document.getElementById('editArea');
  if (body) body.style.display = 'block';
  if (edit) edit.style.display = 'none';
};

window.showEditMode = function() {
  if (!window._currentEditable) return;
  document.getElementById('contentBody').style.display = 'none';
  document.getElementById('editArea').style.display = 'block';
  document.getElementById('editArea').innerHTML = `
    <textarea class="content-editor" id="editTextarea">${window._currentContent || ''}</textarea>
    <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3);">
      <button class="btn-primary" onclick="saveContent()">Save</button>
      <button class="btn-secondary" onclick="showViewMode()">Cancel</button>
    </div>
  `;
};

window.saveContent = async function() {
  if (!window._currentEditable) return;
  const content = document.getElementById('editTextarea').value;
  await fetch('api/content/save', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ path: window._currentPath, content }) });
  window._currentContent = content;
  showViewMode();
  loadContentDocs();
};

// ══════════════════════════════════════════════════════════════
// SSE / POLLING
// ══════════════════════════════════════════════════════════════
let lastSnapshot = null;
let lastOverviewSignature = null;
let lastWorkspacesSignature = null;
let overviewTimeFrame = 7;

function setOverviewTimeFrame(days) {
  overviewTimeFrame = days;
  lastOverviewSignature = null;
  document.querySelectorAll('.tf-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.tf) === days);
  });
  fetchSnapshot();
}

document.addEventListener('click', (e) => {
  const tfBtn = e.target.closest('[data-tf]');
  if (tfBtn) {
    setOverviewTimeFrame(parseInt(tfBtn.dataset.tf));
  }
});
let lastScheduleSignature = null;

function overviewSignature(d) {
  if (!d) return '';
  const workspaces = (d.workspaces || []).map(w => ({
    key: w.key,
    sessions: w.sessions || 0,
    messages: w.messages || 0,
    tools: w.tools || 0,
    last_activity: w.last_activity || 0,
    branch: w.repo_info?.branch || '',
    dirty: !!w.repo_info?.dirty,
    exists: !!w.repo_info?.exists,
  }));
  const recent = (d.sessions?.recent || []).slice(0, 8).map(s => [s.id, s.title, s.started_at]);
  return JSON.stringify({ workspaces, recent });
}

function renderOverviewIfChanged(d, force = false) {
  const sig = overviewSignature(d);
  if (force || sig !== lastOverviewSignature) {
    lastOverviewSignature = sig;
    renderOverview(d);
  }
}

function workspacesSignature(d) {
  if (!d) return '';
  const workspaces = (d.workspaces || []).map(w => ({
    key: w.key,
    label: w.label,
    name: w.name,
    discord: w.discord,
    description: w.description,
    sessions: w.sessions || 0,
    messages: w.messages || 0,
    tools: w.tools || 0,
    last_activity: w.last_activity || 0,
    latest_title: w.latest_session?.title || '',
    repo: {
      exists: !!w.repo_info?.exists,
      dirty: !!w.repo_info?.dirty,
      branch: w.repo_info?.branch || '',
      language: w.repo_info?.language || '',
      last_commit: w.repo_info?.last_commit || '',
    },
  }));
  return JSON.stringify({ workspaces });
}

function renderWorkspacesIfChanged(d, force = false) {
  const sig = workspacesSignature(d);
  if (force || sig !== lastWorkspacesSignature) {
    lastWorkspacesSignature = sig;
    renderAgents(d);
  }
}

function scheduleSignature(d) {
  if (!d) return '';
  const crons = (d.crons || []).map(c => ({
    job_id: c.job_id || '',
    owner: c.owner || '',
    command: c.command || '',
    schedule: c.schedule || '',
    description: c.description || '',
    source: c.source || '',
    enabled: c.enabled !== false,
    state: c.state || '',
    next_run_at: c.next_run_at || '',
  }));
  return JSON.stringify({ crons });
}

function renderScheduleIfChanged(d, force = false) {
  const sig = scheduleSignature(d);
  if (force || sig !== lastScheduleSignature) {
    lastScheduleSignature = sig;
    renderSchedule(d);
  }
}

async function fetchSnapshot() {
  try {
    const tf = overviewTimeFrame > 0 ? `?tf=${overviewTimeFrame}` : '';
    const res = await fetch('api/snapshot' + tf);
    lastSnapshot = await res.json();
    if (currentTab === 'overview') renderOverviewIfChanged(lastSnapshot);
    if (currentTab === 'agents') renderWorkspacesIfChanged(lastSnapshot);
    if (currentTab === 'schedule') renderScheduleIfChanged(lastSnapshot);
  } catch(e) {}
}

function startSSE() {
  try {
    const evtSource = new EventSource('events');
    evtSource.onmessage = (e) => {
      try {
        lastSnapshot = JSON.parse(e.data);
        if (currentTab === 'overview') renderOverviewIfChanged(lastSnapshot);
        if (currentTab === 'agents') renderWorkspacesIfChanged(lastSnapshot);
        if (currentTab === 'schedule') renderScheduleIfChanged(lastSnapshot);
      } catch(ex) {}
    };
    evtSource.onerror = () => {
      evtSource.close();
      setInterval(fetchSnapshot, 8000);
    };
  } catch(e) {
    setInterval(fetchSnapshot, 8000);
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
fetchSnapshot();
startSSE();
</script>
